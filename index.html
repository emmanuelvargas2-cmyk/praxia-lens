<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Praxia Lens — Clasificador de tareas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --navy:#002236;
    --green:#3E7243;
    --green-soft:#e8f0e9;
    --ink:#1c2b33;
    --muted:#5d6c74;
    --line:#dde4e7;
    --bg:#ffffff;
    --auto:#3E7243;
    --hibrida:#B7791F;
    --humana:#1F5FA8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{
    font-family:'Archivo',system-ui,-apple-system,sans-serif;
    color:var(--ink);
    line-height:1.5;
    padding:22px 18px 40px;
    max-width:760px;
    margin:0 auto;
  }
  .head{margin-bottom:18px;}
  .head h1{
    font-family:'Fraunces',Georgia,serif;
    font-weight:700;
    color:var(--navy);
    font-size:clamp(22px,4vw,30px);
    margin:0 0 4px;
    letter-spacing:-.01em;
  }
  .head p{margin:0;color:var(--muted);font-size:14px;}
  .field label{
    display:block;font-weight:600;color:var(--navy);
    font-size:14px;margin-bottom:6px;
  }
  textarea{
    width:100%;min-height:92px;resize:vertical;
    font-family:inherit;font-size:15px;color:var(--ink);
    border:1.5px solid var(--line);border-radius:12px;
    padding:12px 14px;background:#fff;outline:none;
  }
  textarea:focus{border-color:var(--green);}
  .hint{font-size:12.5px;color:var(--muted);margin-top:7px;}
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:12px;}
  button{
    font-family:inherit;font-weight:600;font-size:14.5px;
    border-radius:10px;cursor:pointer;border:1.5px solid transparent;
    padding:11px 18px;transition:filter .15s,background .15s,color .15s;
  }
  button:disabled{opacity:.55;cursor:not-allowed;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover:not(:disabled){filter:brightness(1.15);}
  .btn-ghost{background:#fff;color:var(--navy);border-color:var(--line);}
  .btn-ghost:hover:not(:disabled){border-color:var(--green);color:var(--green);}
  .btn-attach{background:var(--green-soft);color:var(--green);border-color:transparent;}
  .btn-attach:hover{filter:brightness(.97);}
  .btn-report{background:var(--green);color:#fff;}
  .btn-report:hover:not(:disabled){filter:brightness(1.1);}
  #fileInput{display:none;}
  .filechip{
    display:inline-block;font-size:12.5px;font-weight:600;
    border:1.5px solid var(--line);border-radius:999px;
    padding:4px 12px;color:var(--green);
  }
  .filechip .x{margin-left:8px;cursor:pointer;color:var(--muted);font-weight:700;}
  /* RESULT */
  #result{margin-top:24px;}
  .card{
    border:1.5px solid var(--line);border-radius:16px;
    overflow:hidden;background:#fff;
  }
  .verdict{padding:18px 20px;color:#fff;}
  .verdict .tag{
    font-size:12px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;opacity:.85;
  }
  .verdict .cls{
    font-family:'Fraunces',serif;font-weight:700;
    font-size:22px;margin-top:2px;
  }
  .verdict.auto{background:var(--auto);}
  .verdict.hibrida{background:var(--hibrida);}
  .verdict.humana{background:var(--humana);}
  .body{padding:18px 20px;}
  .body h3{
    font-size:13px;font-weight:700;color:var(--navy);
    text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px;
  }
  .summary{font-size:15px;color:var(--ink);margin:0 0 18px;}
  .factor{
    display:flex;justify-content:space-between;gap:14px;
    padding:11px 0;border-top:1px solid var(--line);
  }
  .factor:first-of-type{border-top:none;}
  .factor .fname{font-weight:600;color:var(--navy);font-size:14px;flex:1;}
  .factor .fjust{color:var(--muted);font-size:13.5px;flex:2;}
  .factor .fscore{
    font-weight:700;font-size:13px;color:var(--green);
    white-space:nowrap;align-self:flex-start;
  }
  .error{
    background:#fcf0ec;border:1.5px solid #e8c9c0;color:#8A3B25;
    border-radius:12px;padding:14px 16px;font-size:14px;margin-top:18px;
  }
  .loading{color:var(--muted);font-size:14px;margin-top:18px;display:flex;align-items:center;gap:10px;}
  .spinner{
    width:16px;height:16px;border:2.5px solid var(--line);
    border-top-color:var(--green);border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  /* REPORT SIGN BLOCK */
  .signbox{
    margin-top:18px;border:1.5px dashed var(--line);
    border-radius:14px;padding:16px 18px;background:#fafcfb;
  }
  .signbox h3{
    font-size:13px;font-weight:700;color:var(--navy);
    text-transform:uppercase;letter-spacing:.05em;margin:0 0 4px;
  }
  .signbox p{font-size:13px;color:var(--muted);margin:0 0 14px;}
  .signrow{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:12px;}
  .signrow .f{flex:1;min-width:180px;}
  .signrow label{display:block;font-size:12.5px;font-weight:600;color:var(--navy);margin-bottom:5px;}
  .signrow input{
    width:100%;font-family:inherit;font-size:14px;
    border:1.5px solid var(--line);border-radius:9px;padding:9px 11px;outline:none;
  }
  .signrow input:focus{border-color:var(--green);}
  @media (prefers-reduced-motion:reduce){.spinner{animation:none;}}
  @media (max-width:520px){
    .factor{flex-direction:column;gap:3px;}
    .factor .fscore{align-self:flex-start;}
  }
</style>
</head>
<body>
  <div class="head">
    <h1>Clasificador de tareas</h1>
    <p>Describe una función o tarea laboral y Praxia Lens la clasificará con criterio ético y transparente.</p>
  </div>

  <div class="field">
    <label for="task">Tarea o función a evaluar</label>
    <textarea id="task" placeholder="Ej.: Revisar y aprobar solicitudes de reembolso de empleados…"></textarea>
    <div class="hint">Acepta PDF e imágenes (PNG, JPG) de hasta 3 MB. Puedes adjuntar un archivo, escribir una tarea, o ambos.</div>
  </div>

  <div class="controls">
    <button class="btn-primary" id="analyzeBtn">Analizar tarea</button>
    <button class="btn-attach" id="attachBtn">Adjuntar documento o foto</button>
    <button class="btn-ghost" id="resetBtn">Nuevo análisis</button>
    <input type="file" id="fileInput" accept=".pdf,image/png,image/jpeg" />
    <span id="fileWrap"></span>
  </div>

  <div id="result"></div>

<script>
const FACTOR_LABELS = {
  complejidad_contextual: "Complejidad contextual",
  contacto_humano: "Contacto humano",
  responsabilidad_legal: "Responsabilidad legal",
  discrecion_etica: "Discreción ética",
  creatividad_juicio: "Creatividad y juicio",
  repetitividad: "Repetitividad / estandarización"
};
const CLS_MAP = {
  "automatizable": {css:"auto", label:"Automatizable"},
  "híbrida": {css:"hibrida", label:"Híbrida"},
  "hibrida": {css:"hibrida", label:"Híbrida"},
  "indispensablemente humana": {css:"humana", label:"Indispensablemente Humana"},
  "humana": {css:"humana", label:"Indispensablemente Humana"}
};

let attachedFile = null;
let lastResult = null;   // guarda el último análisis para el reporte

const $ = id => document.getElementById(id);
const taskEl = $("task"), resultEl = $("result"), fileInput = $("fileInput"), fileWrap = $("fileWrap");

$("attachBtn").onclick = () => fileInput.click();

fileInput.onchange = () => {
  const f = fileInput.files[0];
  if(!f){ attachedFile=null; fileWrap.innerHTML=""; return; }
  if(f.size > 3*1024*1024){
    fileWrap.innerHTML = '<span class="filechip" style="color:#8A3B25;border-color:#e8c9c0">Archivo muy grande (máx 3 MB)</span>';
    attachedFile=null; fileInput.value=""; return;
  }
  attachedFile = f;
  fileWrap.innerHTML = '<span class="filechip">'+f.name+'<span class="x" id="rmFile">×</span></span>';
  $("rmFile").onclick = () => { attachedFile=null; fileInput.value=""; fileWrap.innerHTML=""; };
};

$("resetBtn").onclick = () => {
  taskEl.value=""; attachedFile=null; fileInput.value="";
  fileWrap.innerHTML=""; resultEl.innerHTML=""; lastResult=null;
};

$("analyzeBtn").onclick = analyze;

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=()=>rej(new Error("No se pudo leer el archivo."));
    r.readAsDataURL(file);
  });
}

async function analyze(){
  const task = taskEl.value.trim();
  if(!task && !attachedFile){
    resultEl.innerHTML = '<div class="error">Escribe una tarea o adjunta un documento para analizar.</div>';
    return;
  }
  $("analyzeBtn").disabled = true;
  resultEl.innerHTML = '<div class="loading"><span class="spinner"></span> Analizando con criterio ético…</div>';

  try{
    const payload = { task };
    if(attachedFile){
      payload.fileData = await fileToBase64(attachedFile);
      payload.fileType = attachedFile.type;
      payload.fileName = attachedFile.name;
    }
    const r = await fetch("/api/classify",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    const data = await r.json();
    if(!r.ok){ throw new Error(data.error || "Error del servidor."); }
    lastResult = { ...data, taskText: task || (attachedFile ? attachedFile.name : "") };
    render(lastResult);
  }catch(e){
    resultEl.innerHTML = '<div class="error">'+e.message+'</div>';
  }finally{
    $("analyzeBtn").disabled = false;
  }
}

function render(d){
  const key = (d.clasificacion||"").toLowerCase().trim();
  const cls = CLS_MAP[key] || {css:"hibrida", label:d.clasificacion||"Sin clasificar"};
  let factorsHtml = "";
  const factores = d.factores || {};
  for(const k in FACTOR_LABELS){
    const f = factores[k];
    if(!f) continue;
    const just = typeof f === "object" ? (f.justificacion||"") : "";
    const score = typeof f === "object" ? (f.nivel||f.score||"") : f;
    factorsHtml += '<div class="factor"><span class="fname">'+FACTOR_LABELS[k]+'</span>'+
      '<span class="fjust">'+just+'</span><span class="fscore">'+score+'</span></div>';
  }
  resultEl.innerHTML =
    '<div class="card">'+
      '<div class="verdict '+cls.css+'"><div class="tag">Clasificación</div><div class="cls">'+cls.label+'</div></div>'+
      '<div class="body">'+
        (d.resumen ? '<p class="summary">'+d.resumen+'</p>' : '')+
        '<h3>Factores evaluados</h3>'+ factorsHtml +
      '</div>'+
    '</div>'+
    buildSignBlock();
  $("genReportBtn").onclick = generateReport;
}

function buildSignBlock(){
  return ''+
  '<div class="signbox">'+
    '<h3>Validación humana del análisis</h3>'+
    '<p>Esta clasificación es un insumo de apoyo, no una decisión. Requiere revisión y firma de un responsable humano antes de informar cualquier acción.</p>'+
    '<div class="signrow">'+
      '<div class="f"><label for="rName">Nombre del responsable (letra de molde)</label><input id="rName" type="text" placeholder="Nombre y apellido" /></div>'+
      '<div class="f"><label for="rRole">Cargo o función</label><input id="rRole" type="text" placeholder="Ej.: Gerente de Operaciones" /></div>'+
    '</div>'+
    '<div class="signrow">'+
      '<div class="f"><label for="rOrg">Organización (opcional)</label><input id="rOrg" type="text" placeholder="Nombre de la empresa" /></div>'+
    '</div>'+
    '<button class="btn-report" id="genReportBtn">Generar reporte para firma (PDF)</button>'+
  '</div>';
}

/* ---------- REPORTE PDF (formato carta) ---------- */
function generateReport(){
  if(!lastResult) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"pt", format:"letter"}); // 612 x 792 pt
  const M = 56;                 // margen
  const W = 612 - M*2;          // ancho útil
  let y = M;

  const NAVY=[0,34,54], GREEN=[62,114,67], INK=[28,43,51], MUTED=[93,108,116], LINE=[221,228,231];
  const today = new Date().toLocaleDateString("es-PR",{year:"numeric",month:"long",day:"numeric"});

  // Encabezado de marca
  doc.setFont("times","bold"); doc.setFontSize(20); doc.setTextColor(...NAVY);
  doc.text("PRAXIA LENS", M, y); y+=8;
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(...GREEN);
  doc.text("Automatizar con criterio. Decidir con humanidad.", M, y+8); y+=18;
  doc.setDrawColor(...GREEN); doc.setLineWidth(1.5); doc.line(M, y, M+W, y); y+=26;

  // Título del documento
  doc.setFont("times","bold"); doc.setFontSize(14); doc.setTextColor(...INK);
  doc.text("Reporte de Clasificación de Tarea", M, y); y+=16;
  doc.setFont("helvetica","normal"); doc.setFontSize(9.5); doc.setTextColor(...MUTED);
  doc.text("Fecha de emisión: "+today, M, y); y+=26;

  // Tarea evaluada
  doc.setFont("helvetica","bold"); doc.setFontSize(10.5); doc.setTextColor(...NAVY);
  doc.text("Tarea o función evaluada", M, y); y+=14;
  doc.setFont("helvetica","normal"); doc.setFontSize(10.5); doc.setTextColor(...INK);
  y = wrap(doc, lastResult.taskText || "—", M, y, W, 14); y+=14;

  // Clasificación (banda de color)
  const key=(lastResult.clasificacion||"").toLowerCase().trim();
  const clsColor = key.includes("automatiz") ? GREEN : key.includes("humana") ? [31,95,168] : [183,121,31];
  const clsLabel = (CLS_MAP[key]||{label:lastResult.clasificacion||"—"}).label;
  doc.setFillColor(...clsColor); doc.roundedRect(M, y, W, 34, 5, 5, "F");
  doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.setTextColor(255,255,255);
  doc.text("CLASIFICACIÓN", M+14, y+13);
  doc.setFont("times","bold"); doc.setFontSize(14);
  doc.text(clsLabel, M+14, y+27); y+=50;

  // Resumen
  if(lastResult.resumen){
    doc.setFont("helvetica","bold"); doc.setFontSize(10.5); doc.setTextColor(...NAVY);
    doc.text("Resumen del análisis", M, y); y+=14;
    doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(...INK);
    y = wrap(doc, lastResult.resumen, M, y, W, 13); y+=16;
  }

  // Factores
  doc.setFont("helvetica","bold"); doc.setFontSize(10.5); doc.setTextColor(...NAVY);
  doc.text("Factores evaluados", M, y); y+=14;
  const factores = lastResult.factores || {};
  for(const k in FACTOR_LABELS){
    const f=factores[k]; if(!f) continue;
    const just = typeof f==="object" ? (f.justificacion||"") : "";
    const score= typeof f==="object" ? (f.nivel||f.score||"") : f;
    y = pageBreak(doc, y, 40, M);
    doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(...INK);
    doc.text(FACTOR_LABELS[k] + (score? "  ·  "+score : ""), M, y); y+=13;
    if(just){
      doc.setFont("helvetica","normal"); doc.setFontSize(9.5); doc.setTextColor(...MUTED);
      y = wrap(doc, just, M, y, W, 12); 
    }
    y+=10;
  }
  y+=6;

  // Leyenda de gobernanza
  y = pageBreak(doc, y, 70, M);
  doc.setDrawColor(...LINE); doc.setLineWidth(1); doc.line(M, y, M+W, y); y+=16;
  doc.setFont("helvetica","italic"); doc.setFontSize(9); doc.setTextColor(...MUTED);
  y = wrap(doc, "Esta clasificación constituye un insumo de apoyo a la decisión y no puede ser la base única de una acción de personal. Requiere revisión, validación y firma de un responsable humano identificado antes de informar cualquier decisión organizacional.", M, y, W, 12);
  y+=22;

  // Bloque de firma
  y = pageBreak(doc, y, 130, M);
  const name=(document.getElementById("rName")||{}).value||"";
  const role=(document.getElementById("rRole")||{}).value||"";
  const org =(document.getElementById("rOrg")||{}).value||"";
  doc.setFont("helvetica","bold"); doc.setFontSize(10.5); doc.setTextColor(...NAVY);
  doc.text("Validación y firma del responsable", M, y); y+=24;

  // Nombre en letra de molde
  doc.setFont("helvetica","normal"); doc.setFontSize(10.5); doc.setTextColor(...INK);
  doc.text(name || "", M, y);
  doc.setDrawColor(...LINE); doc.line(M, y+5, M+260, y+5);
  doc.setFontSize(8); doc.setTextColor(...MUTED);
  doc.text("Nombre en letra de molde", M, y+17);

  // Cargo
  doc.setFont("helvetica","normal"); doc.setFontSize(10.5); doc.setTextColor(...INK);
  doc.text(role || "", M+300, y);
  doc.line(M+300, y+5, M+W, y+5);
  doc.setFontSize(8); doc.setTextColor(...MUTED);
  doc.text("Cargo o función", M+300, y+17);
  y+=58;

  // Firma manuscrita (espacio en blanco) + fecha
  doc.setDrawColor(...LINE); doc.line(M, y+5, M+260, y+5);
  doc.setFontSize(8); doc.setTextColor(...MUTED);
  doc.text("Firma", M, y+17);
  doc.line(M+300, y+5, M+W, y+5);
  doc.text("Fecha", M+300, y+17);
  y+=40;

  if(org){
    doc.setFontSize(9); doc.setTextColor(...MUTED);
    doc.text("Organización: "+org, M, y);
  }

  // Pie
  doc.setFontSize(8); doc.setTextColor(...MUTED);
  doc.text("Generado por Praxia Lens — instrumento de rendición de cuentas sobre la automatización.", M, 770);

  const safe = (lastResult.taskText||"tarea").slice(0,30).replace(/[^\wáéíóúñ ]/gi,"").trim().replace(/\s+/g,"_");
  doc.save("Praxia_Lens_Reporte_"+(safe||"tarea")+".pdf");
}

// Envuelve texto y devuelve la nueva y. Maneja salto de página.
function wrap(doc, text, x, y, maxW, lh){
  const lines = doc.splitTextToSize(String(text), maxW);
  for(const ln of lines){
    y = pageBreak(doc, y, lh, 56);
    doc.text(ln, x, y); y+=lh;
  }
  return y;
}
function pageBreak(doc, y, needed, top){
  if(y + needed > 770){ doc.addPage(); return top; }
  return y;
}
</script>
</body>
</html>
