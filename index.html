<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Praxia Lens · Clasificador de tareas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

  :root{
    /* Identidad EXACTA de la presentación Praxia Lens (tokens del deck) */
    --ink:#002236;        /* navy principal · títulos y elementos fuertes */
    --body:#2D3E47;       /* texto de cuerpo · color más usado del deck */
    --navy2:#5C6B72;      /* texto tenue / secundario */
    --green:#3E7243;      /* verde principal */
    --green-light:#6F9A5E;
    --green-soft:#EAF1EA;
    --paper:#FFFFFF; --cloud:#FFFFFF; --line:#E4E2DB; --amber:#B0791F;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:'Montserrat',system-ui,sans-serif;color:var(--body);background:var(--paper);
    -webkit-font-smoothing:antialiased;padding:18px;
  }
  .wrap{max-width:760px;margin:0 auto}

  /* Etiqueta tipo "eyebrow" del deck: verde, versalitas, espaciada */
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--green)}

  .head{margin-bottom:20px}
  .head .eyebrow-h{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--green)}
  .head .title-h{font-weight:700;font-size:24px;color:var(--ink);letter-spacing:-.3px;margin-top:5px;line-height:1.1}

  .card{
    background:var(--cloud);border:1px solid var(--line);border-radius:20px;padding:24px;
    box-shadow:0 24px 60px -46px rgba(0,34,54,.45);
  }
  label.field{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--green)}
  textarea{
    width:100%;margin-top:10px;padding:14px 16px;border-radius:14px;border:1px solid var(--line);
    background:#fff;font-size:15px;font-family:'Montserrat',sans-serif;color:var(--body);resize:vertical;min-height:76px;
  }
  textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}
  .chip{
    font-size:11.5px;font-weight:500;border:1px solid var(--line);
    background:#fff;color:var(--navy2);border-radius:999px;padding:8px 14px;cursor:pointer;transition:all .18s ease;
  }
  .chip:hover{background:var(--ink);color:#fff;border-color:var(--ink)}

  .toolrow{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:16px}
  .attach{
    display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;
    border:1px dashed var(--green);color:var(--green);background:var(--green-soft);
    border-radius:12px;padding:10px 15px;cursor:pointer;transition:all .18s ease;
  }
  .attach:hover{background:#DEEBDF}
  .filechip{
    display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:500;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 13px;
  }
  .filechip .x{cursor:pointer;color:var(--navy2);font-weight:700}
  .hint{font-size:11.5px;color:#8B938E;margin-top:9px}

  .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
  .btn{
    display:inline-flex;align-items:center;gap:9px;background:var(--green);color:#fff;
    font-family:'Montserrat',sans-serif;font-weight:600;font-size:15px;padding:12px 26px;border-radius:12px;border:none;cursor:pointer;transition:all .2s ease;
  }
  .btn:hover{background:#4A8551;transform:translateY(-1px);box-shadow:0 10px 24px -10px var(--green)}
  .btn:disabled{background:#B9C4CE;color:#fff;cursor:default;transform:none;box-shadow:none}
  .btn-navy{background:var(--ink)}
  .btn-navy:hover{background:#0A2D44}
  .btn-ghost{background:transparent;color:var(--navy2);border:1px solid var(--line);font-weight:600}
  .btn-ghost:hover{background:#fff;color:var(--ink);border-color:var(--navy2);box-shadow:none;transform:none}
  .spin{width:17px;height:17px;border:2px solid #ffffff66;border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .err{display:flex;gap:10px;margin-top:16px;background:#FBEFEC;border:1px solid #E8C9C0;color:#8A3B25;border-radius:14px;padding:13px 16px;font-size:14px}

  .result{margin-top:20px;background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;
    box-shadow:0 24px 60px -44px rgba(0,34,54,.5);animation:up .6s cubic-bezier(.2,.7,.2,1) both}
  @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .rhead{padding:24px}
  .rtop{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px;margin-top:12px}
  .pill{
    display:inline-flex;align-items:center;font-weight:700;font-size:17px;color:#fff;
    border-radius:999px;padding:11px 22px;letter-spacing:.2px;
  }
  .ridx{text-align:right}
  .ridx .num{font-weight:800;font-size:30px;line-height:1}
  .ridx .num small{font-size:14px;font-weight:600;color:#9AA39C}
  .track{margin-top:18px;height:11px;border-radius:999px;background:#ffffffcc;border:1px solid #ffffff;overflow:hidden}
  .track > div{height:100%;border-radius:999px;transition:width 1s cubic-bezier(.2,.7,.2,1)}
  .scale{display:flex;justify-content:space-between;font-size:9.5px;font-weight:600;letter-spacing:.8px;color:var(--navy2);margin-top:7px}

  .rbody{padding:24px}
  .explain{font-size:15px;color:var(--body);line-height:1.7;margin:0;text-align:justify}
  .sub{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin:26px 0 14px}
  .factor{margin-bottom:14px}
  .frow{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .fname{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;color:var(--ink)}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .dirtag{font-size:8.5px;font-weight:700;letter-spacing:.4px;border-radius:5px;padding:2px 7px}
  .fval{font-size:12.5px;font-weight:600;color:var(--navy2)}
  .fbar{height:8px;border-radius:999px;background:#EEF0ED;overflow:hidden}
  .fbar > div{height:100%;border-radius:999px;transition:width 1s cubic-bezier(.2,.7,.2,1)}
  .fnote{font-size:12px;color:#7C8794;margin-top:5px}

  .risks{margin-top:26px}
  .rtitle{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
  .risks ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:8px}
  .risks li{display:flex;gap:9px;font-size:13.5px;color:var(--navy2);line-height:1.55}
  .risks li span{color:var(--amber)}

  .gov{display:flex;gap:12px;background:var(--ink);color:#C5D4DE;padding:20px 24px;font-size:13.5px;line-height:1.6}
  .gov div{text-align:justify}
  .gov strong{color:#fff}

  /* Bloque de validación + firma (estilo deck) */
  .sign{padding:24px;border-top:1px solid var(--line);background:var(--green-soft)}
  .sign p{font-size:13px;color:var(--navy2);margin:6px 0 16px;line-height:1.6}
  .signrow{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:12px}
  .signrow .f{flex:1;min-width:190px}
  .signrow .f label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:6px}
  .signrow .f input{
    width:100%;font-family:'Montserrat',sans-serif;font-size:14px;color:var(--body);
    border:1px solid var(--line);border-radius:11px;padding:11px 13px;background:#fff;
  }
  .signrow .f input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px #ffffff}
  .signactions{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}

  .again{display:flex;justify-content:center;padding:18px 24px;border-top:1px solid var(--line);background:var(--paper)}
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <div class="eyebrow-h">Praxia Lens</div>
    <div class="title-h">Clasificador de tareas</div>
  </div>

  <div class="card">
    <label class="field">Tarea a evaluar</label>
    <textarea id="task" placeholder="Describe una tarea o función laboral… (o adjunta un documento abajo)"></textarea>

    <div class="chips" id="chips"></div>

    <div class="toolrow">
      <button class="attach" id="attachBtn" type="button">
        <span aria-hidden="true">＋</span> Adjuntar documento o foto
      </button>
      <span id="fileWrap"></span>
      <input id="fileInput" type="file" accept=".pdf,image/png,image/jpeg,image/webp,image/gif" style="display:none" />
    </div>
    <div class="hint">Acepta PDF e imágenes (PNG, JPG) de hasta 3 MB. Puedes adjuntar un archivo, escribir una tarea, o ambos.</div>

    <div class="actions">
      <button class="btn" id="go">
        <span id="goicon" aria-hidden="true">➤</span><span id="golabel">Analizar tarea</span>
      </button>
    </div>
  </div>

  <div id="out"></div>
</div>

const taskEl = document.getElementById("task");
const out = document.getElementById("out");
const goBtn = document.getElementById("go");
const goLabel = document.getElementById("golabel");

const attachBtn = document.getElementById("attachBtn");
const fileInput = document.getElementById("fileInput");
const fileWrap = document.getElementById("fileWrap");

let attached = null; // { name, mediaType, data(base64) }
let lastResult = null; // guarda el análisis + la tarea, para el reporte

const chips = document.getElementById("chips");
EXAMPLES.forEach(ex=>{
  const b=document.createElement("button");
  b.className="chip"; b.textContent=ex; b.type="button";
  b.onclick=()=>{ taskEl.value=ex; analyze(); };
  chips.appendChild(b);
});

const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const clamp = n => Math.max(0, Math.min(100, parseInt(n,10)||0));

attachBtn.onclick = () => fileInput.click();
fileInput.onchange = () => {
  const f = fileInput.files && fileInput.files[0];
  if(!f) return;
  if(f.size > MAX_BYTES){
    fileWrap.innerHTML = '<span class="filechip" style="color:#8A3B25;border-color:#E8C9C0">Archivo muy grande (máx 3 MB)</span>';
    fileInput.value = ""; attached = null; return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    attached = { name: f.name, mediaType: f.type || "application/octet-stream", data: String(reader.result).split(",")[1] };
    fileWrap.innerHTML = '<span class="filechip">'+esc(f.name)+' <span class="x" id="rmFile">×</span></span>';
    document.getElementById("rmFile").onclick = clearFile;
  };
  reader.readAsDataURL(f);
};
function clearFile(){ attached=null; fileInput.value=""; fileWrap.innerHTML=""; }

function setLoading(on){
  goBtn.disabled = on;
  const icon = document.getElementById("goicon");
  if(on){ icon.outerHTML = '<span id="goicon" class="spin"></span>'; goLabel.textContent="Analizando…"; }
  else { const i=document.getElementById("goicon"); if(i){ i.outerHTML='<span id="goicon" aria-hidden="true">➤</span>'; } goLabel.textContent="Analizar tarea"; }
}

async function analyze(){
  const task = taskEl.value.trim();
  if(!task && !attached) return;
  setLoading(true); out.innerHTML="";
  try{
    const res = await fetch("/api/classify", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ task, file: attached ? { data: attached.data, mediaType: attached.mediaType } : null })
    });
    if(!res.ok) throw new Error("bad status");
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    lastResult = { ...data, _task: task || (attached ? attached.name : "") };
    render(data);
  }catch(e){
    out.innerHTML = '<div class="err"><span aria-hidden="true">⚠</span><span>No se pudo completar el análisis. Verifica que el bot esté publicado y que la llave de API esté configurada en Vercel. Si adjuntaste un archivo, prueba con uno más pequeño.</span></div>';
  }finally{
    setLoading(false);
  }
}
goBtn.onclick = analyze;

function resetAll(){
  taskEl.value = "";
  clearFile();
  out.innerHTML = "";
  lastResult = null;
  window.scrollTo({ top:0, behavior:"smooth" });
  taskEl.focus();
}

function render(r){
  const cls = CLASS_STYLE[r.clasificacion] || CLASS_STYLE["Híbrida"];
  const idx = clamp(r.indice_automatizacion);

  const factors = (r.factores||[]).map(f=>{
    const auto = f.direccion === "automatiza";
    const col = auto ? "#3E7243" : "#002236";
    const p = clamp(f.presencia);
    return `
      <div class="factor">
        <div class="frow">
          <div class="fname">
            <span class="dot" style="background:${col}"></span>${esc(f.nombre)}
            <span class="dirtag" style="color:${col};border:1px solid ${col}44">${auto?"→ AUTOMATIZA":"→ HUMANO"}</span>
          </div>
          <span class="fval">${p}</span>
        </div>
        <div class="fbar"><div style="width:${p}%;background:${col}"></div></div>
        ${f.nota?`<div class="fnote">${esc(f.nota)}</div>`:""}
      </div>`;
  }).join("");

  const risks = Array.isArray(r.riesgos_eticos)&&r.riesgos_eticos.length
    ? `<div class="risks"><div class="rtitle">⚠ Riesgos éticos a vigilar</div><ul>${
        r.riesgos_eticos.map(x=>`<li><span aria-hidden="true">▸</span>${esc(x)}</li>`).join("")
      }</ul></div>` : "";

  out.innerHTML = `
    <div class="result">
      <div class="rhead" style="background:${cls.bg}">
        <div class="eyebrow">Clasificación propuesta</div>
        <div class="rtop">
          <span class="pill" style="background:${cls.color}">${esc(r.clasificacion)}</span>
          <div class="ridx">
            <div class="eyebrow" style="color:${cls.color}">Índice de automatización</div>
            <div class="num" style="color:${cls.color}">${idx}<small>/100</small></div>
          </div>
        </div>
        <div class="track"><div style="width:${idx}%;background:${cls.color}"></div></div>
        <div class="scale"><span>HUMANO</span><span>HÍBRIDO</span><span>AUTOMATIZABLE</span></div>
      </div>
      <div class="rbody">
        <p class="explain">${esc(r.explicacion)}</p>
        <div class="sub">Factores de criterio (pesos transparentes)</div>
        ${factors}
        ${risks}
      </div>
      <div class="gov">
        <span style="color:#5E9A63;flex-shrink:0" aria-hidden="true">✎</span>
        <div><strong>Supervisión humana obligatoria. </strong>${
          esc(r.gobernanza || "Esta clasificación es un insumo, no una decisión. Debe ser revisada, validada y firmada por un responsable humano, y nunca puede ser la base única de una acción de personal.")
        }</div>
      </div>

      <div class="sign">
        <div class="eyebrow">Validación humana del análisis</div>
        <p>Esta clasificación requiere la revisión y firma de un responsable humano antes de informar cualquier decisión. Completa los datos y genera el reporte en formato carta para firmar.</p>
        <div class="signrow">
          <div class="f"><label for="rName">Nombre del responsable (letra de molde)</label><input id="rName" type="text" placeholder="Nombre y apellido" /></div>
          <div class="f"><label for="rRole">Cargo o función</label><input id="rRole" type="text" placeholder="Ej.: Gerente de Operaciones" /></div>
        </div>
        <div class="signrow">
          <div class="f"><label for="rOrg">Organización (opcional)</label><input id="rOrg" type="text" placeholder="Nombre de la empresa o entidad" /></div>
        </div>
        <div class="signactions">
          <button class="btn btn-navy" id="genReport" type="button"><span aria-hidden="true">⬇</span> Generar reporte para firma (PDF)</button>
        </div>
      </div>

      <div class="again">
        <button class="btn btn-ghost" id="newBtn" type="button">↺ &nbsp;Nuevo análisis</button>
      </div>
    </div>`;
  document.getElementById("newBtn").onclick = resetAll;
  document.getElementById("genReport").onclick = generateReport;
}

/* ============ REPORTE PDF · Carta o Legal (auto · una sola página) ============ */
function reportFileName(){
  const safe = (lastResult._task||"tarea").slice(0,32).replace(/[^\wáéíóúñ ]/gi,"").trim().replace(/\s+/g,"_") || "tarea";
  return "Praxia_Lens_Reporte_"+safe+".pdf";
}

function buildReport(format){
  const { jsPDF } = window.jspdf;
  const PAGE_H = format === "legal" ? 1008 : 792;      // carta 792 · legal 1008 (ambos 612 de ancho)
  const doc = new jsPDF({ unit:"pt", format: format });
  const M = 58, W = 612 - M*2, BOTTOM = PAGE_H - 58;
  let y = M;

  const NAVY=[0,34,54], GREEN=[62,114,67], INK=[45,62,71], MUTED=[92,107,114], LINE=[228,226,219];
  const r = lastResult;
  const idx = clamp(r.indice_automatizacion);
  const clsName = r.clasificacion || "—";
  const clsColor = clsName.indexOf("Automatiz")===0 ? GREEN
                 : clsName.indexOf("Indispensable")===0 ? [0,34,54]
                 : [176,121,31];
  const today = new Date().toLocaleDateString("es-PR",{year:"numeric",month:"long",day:"numeric"});

  function pb(need){ if(y+need>BOTTOM){ doc.addPage(); y=M; } }
  function para(text,x,size,color,style,lh,width){
    doc.setFont("helvetica",style||"normal"); doc.setFontSize(size); doc.setTextColor(...(color||INK));
    const lines = doc.splitTextToSize(String(text||""), width||W);
    for(const ln of lines){ pb(lh); doc.text(ln, x, y); y+=lh; }
  }
  function paraJ(text,x,size,color,style,lh,width){
    const w = width||W;
    doc.setFont("helvetica",style||"normal"); doc.setFontSize(size); doc.setTextColor(...(color||INK));
    const lines = doc.splitTextToSize(String(text||""), w);
    lines.forEach((ln,i)=>{ pb(lh);
      if(i < lines.length-1){ doc.text(ln, x, y, {align:"justify", maxWidth:w}); }
      else { doc.text(ln, x, y); }
      y+=lh;
    });
  }

  // ---- Logo de marca (centrado) ----
  const logoH = 82, logoW = logoH * (760/506);
  try { doc.addImage(LOGO, "JPEG", (612-logoW)/2, y, logoW, logoH); } catch(e){}
  y += logoH + 12;
  doc.setDrawColor(...GREEN); doc.setLineWidth(2); doc.line(M, y, M+W, y); y+=22;

  // ---- Título ----
  doc.setFont("helvetica","bold"); doc.setFontSize(15); doc.setTextColor(...INK);
  doc.text("Reporte de clasificación de tarea", M, y); y+=16;
  doc.setFont("helvetica","normal"); doc.setFontSize(9.5); doc.setTextColor(...MUTED);
  doc.text("Fecha de emisión: "+today, M, y); y+=22;

  // ---- Tarea evaluada ----
  doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(...GREEN);
  doc.text("TAREA O FUNCIÓN EVALUADA", M, y); y+=13;
  para(r._task || "—", M, 10.5, INK, "normal", 14); y+=12;

  // ---- Banda de clasificación + índice ----
  pb(54);
  doc.setFillColor(...clsColor); doc.roundedRect(M, y, W, 42, 7, 7, "F");
  doc.setFont("helvetica","bold"); doc.setFontSize(7.5); doc.setTextColor(255,255,255);
  doc.text("CLASIFICACIÓN PROPUESTA", M+16, y+15);
  doc.setFontSize(15); doc.text(clsName, M+16, y+32);
  doc.setFontSize(7.5); doc.setFont("helvetica","bold");
  doc.text("ÍNDICE DE AUTOMATIZACIÓN", M+W-16, y+15, {align:"right"});
  doc.setFontSize(20); doc.text(idx+" / 100", M+W-16, y+33, {align:"right"});
  y+=56;

  // ---- Explicación ----
  if(r.explicacion){
    doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(...GREEN);
    doc.text("RESUMEN DEL ANÁLISIS", M, y); y+=13;
    paraJ(r.explicacion, M, 10, INK, "normal", 14); y+=14;
  }

  // ---- Factores ----
  doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(...GREEN);
  pb(20); doc.text("FACTORES DE CRITERIO (PESOS TRANSPARENTES)", M, y); y+=16;
  (r.factores||[]).forEach(f=>{
    const auto = f.direccion === "automatiza";
    const col = auto ? GREEN : NAVY;
    const p = clamp(f.presencia);
    pb(42);
    doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(...INK);
    doc.text(f.nombre || "", M+12, y);
    const nameW = doc.getTextWidth(f.nombre || "");
    doc.setFontSize(7.5); doc.setTextColor(...col);
    doc.text(auto?"AUTOMATIZA":"HUMANO", M+12+nameW+10, y);
    doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(...col);
    doc.text(String(p), M+W, y, {align:"right"});
    doc.setFillColor(...col); doc.circle(M+4, y-3, 3, "F");
    y += 9;                                  // gap nombre → barra
    doc.setFillColor(238,240,237); doc.roundedRect(M+12, y, W-12, 5, 2.5, 2.5, "F");
    doc.setFillColor(...col); doc.roundedRect(M+12, y, Math.max(3,(W-12)*p/100), 5, 2.5, 2.5, "F");
    y += 5 + 10;                             // alto barra + gap → nota
    if(f.nota){ doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.setTextColor(...MUTED);
      const ln = doc.splitTextToSize(f.nota, W-12); pb(ln.length*11);
      ln.forEach(l=>{ doc.text(l, M+12, y); y+=11; }); }
    y += 11;                                 // gap entre factores
  });
  y+=2;

  // ---- Riesgos ----
  if(Array.isArray(r.riesgos_eticos) && r.riesgos_eticos.length){
    pb(24); doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(176,121,31);
    doc.text("RIESGOS ÉTICOS A VIGILAR", M, y); y+=13;
    r.riesgos_eticos.forEach(x=>{
      doc.setFont("helvetica","normal"); doc.setFontSize(9.5); doc.setTextColor(...MUTED);
      const ln = doc.splitTextToSize("•  "+x, W-6); pb(ln.length*12);
      ln.forEach(l=>{ doc.text(l, M, y); y+=12; }); y+=3;
    });
    y+=8;
  }

  // ---- Leyenda de gobernanza ----
  pb(56);
  doc.setDrawColor(...LINE); doc.setLineWidth(1); doc.line(M, y, M+W, y); y+=16;
  paraJ("Supervisión humana obligatoria. Esta clasificación constituye un insumo de apoyo a la decisión y no puede ser la base única de una acción de personal. Requiere revisión, validación y firma de un responsable humano identificado antes de informar cualquier decisión organizacional.", M, 9, MUTED, "italic", 12);
  y+=20;

  // ---- Bloque de firma ----
  pb(140);
  const name=(document.getElementById("rName")||{}).value||"";
  const role=(document.getElementById("rRole")||{}).value||"";
  const org =(document.getElementById("rOrg")||{}).value||"";
  doc.setFont("helvetica","bold"); doc.setFontSize(10.5); doc.setTextColor(...NAVY);
  doc.text("Validación y firma del responsable", M, y); y+=26;
  const colW = (W-30)/2, c2 = M+colW+30;
  doc.setFont("helvetica","normal"); doc.setFontSize(11); doc.setTextColor(...INK);
  if(name) doc.text(name, M, y);
  if(role) doc.text(role, c2, y);
  doc.setDrawColor(...LINE); doc.line(M, y+6, M+colW, y+6); doc.line(c2, y+6, c2+colW, y+6);
  doc.setFontSize(8); doc.setTextColor(...MUTED);
  doc.text("Nombre en letra de molde", M, y+18); doc.text("Cargo o función", c2, y+18);
  y+=54;
  doc.setDrawColor(...LINE); doc.line(M, y+6, M+colW, y+6); doc.line(c2, y+6, c2+colW, y+6);
  doc.setFontSize(8); doc.setTextColor(...MUTED);
  doc.text("Firma", M, y+18); doc.text("Fecha", c2, y+18);
  y+=38;
  if(org){ doc.setFontSize(9); doc.setTextColor(...MUTED); doc.text("Organización: "+org, M, y); }

  // ---- Pie en cada página ----
  const footerY = PAGE_H - 20;
  const pages = doc.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor(...MUTED);
    doc.text("Generado por Praxia Lens — instrumento de rendición de cuentas sobre la automatización.", M, footerY);
    doc.text(i+" / "+pages, M+W, footerY, {align:"right"});
  }
  return { doc, pages };
}

function generateReport(){
  if(!lastResult || !window.jspdf){ return; }
  let res = buildReport("letter");
  if(res.pages > 1){ res = buildReport("legal"); }   // si no cabe en carta, usa legal para no pasar a 2da página
  res.doc.save(reportFileName());
}

</script>
